# Engineering Hub Configuration
# Copy this file to your workspace as config.yaml and fill in values

# ── LLM provider ─────────────────────────────────────────────────
# Choose which backend agents use for text generation:
#   "anthropic" — Claude API (default, requires api_key)
#   "mlx"       — Local Apple Silicon inference via mlx-lm
llm_provider: "anthropic"

django:
  # Django consultingmanager API URL
  api_url: "http://localhost:8000/api"

  # API authentication token
  # Get this from Django: python manage.py drf_create_token <username>
  # Or set environment variable: ENGINEERING_HUB_DJANGO_API_TOKEN
  api_token: ""

  # Cache TTL for API responses (seconds)
  cache_ttl: 300

anthropic:
  # Anthropic API key for Claude
  # Get this from: https://console.anthropic.com/
  # Or set environment variable: ENGINEERING_HUB_ANTHROPIC_API_KEY
  api_key: ""

  # Claude model to use
  model: "claude-sonnet-4-5-20250929"

  # Maximum tokens for responses
  max_tokens: 4000

workspace:
  # Base workspace directory
  # Default: ~/org-roam/engineering-hub
  dir: "~/org-roam/engineering-hub"

  # Working directory for input files (PDFs, DOCX, .md).
  # Drop files here and reference them with short relative paths in task wikilinks:
  #   [[inputs/project-25/client-brief.pdf]]
  # Defaults to workspace_dir/inputs if not set.
  # inputs_dir: "~/org-roam/engineering-hub/inputs"

# Journal / task dispatch mode
#
# Three mutually exclusive modes (use_org_mode takes priority):
#
#   use_org_mode: true   — read tasks from org-roam daily journal .org files
#                          (recommended — integrates with your existing workflow)
#   use_journal_mode: true — read tasks from workspace_dir/journal.md
#   (neither)            — legacy shared-notes.md with @agent: STATUS blocks
#
journal:
  # ── Org mode (org-roam daily journal) ─────────────────────────────
  # Watches org_journal_dir for *.org changes.
  # Tasks are written as:  - [ ] @research: description [[django://project/25]]
  # Capture templates are defined in $DOOMDIR/config.el (see docs/workflow.md).
  use_org_mode: true

  # Path to daily .org files (YYYY-MM-DD.org)
  # Default: ~/org-roam/journal
  # org_journal_dir: "~/org-roam/journal"

  # Org headings whose list items are treated as agent tasks
  org_task_sections:
    - "Overnight Agent Tasks"

  # How many recent daily files to scan for pending tasks
  # 3 = covers a weekend gap (Friday → Monday)
  org_lookback_days: 3

  # How many recent daily files to include when building historical task context
  # for agents (used by context enrichment, not task dispatch)
  org_context_lookback_days: 7

  # ── Markdown journal mode (fallback) ──────────────────────────────
  # Only active when use_org_mode is false.
  use_journal_mode: false

  # Category header -> agent mapping (items under these become tasks)
  categories:
    "Project Work to-do": "research"
    "Technical Writing Work": "technical-writer"
    "Technical Review Work": "technical-reviewer"
    "Thoughts to Expand or Clarify": "research"
  # "Incoming Comms" has no mapping - notes only

# ── Roam graph integration ─────────────────────────────────────────
roam:
  # Create .org wrapper nodes in the roam directory for agent outputs,
  # giving them a presence in the org-roam knowledge graph
  wrappers_enabled: true

# Staging directory for ingested files (PDF/DOCX -> markdown)
staging:
  manifest_name: "manifest.json"

# ── MLX local model (Apple Silicon) ───────────────────────────────
# Used when llm_provider is "mlx". Install with: pip install 'engineering-hub[mlx]'
# Gemma 4 is a Vision-Language Model (VLM) — the engine auto-detects this and
# uses mlx-vlm instead of mlx-lm transparently.
# mlx:
#   # HuggingFace model ID — resolved from the HF cache automatically:
#   model_path: "mlx-community/gemma-4-31b-it-8bit"
#
#   # Or point directly at a local cache snapshot directory:
#   # model_path: "~/.cache/huggingface/hub/models--mlx-community--gemma-4-31b-it-8bit/snapshots/<hash>"
#
#   # Sampling parameters (defaults shown)
#   temp: 0.7
#   top_p: 0.9
#   min_p: 0.05
#   repetition_penalty: 1.1
#   max_tokens: 4000

# ── Local embeddings ──────────────────────────────────────────────
ollama:
  host: "http://localhost:11434"
  # Pull the model once before first use:
  #   ollama pull nomic-embed-text     (274MB, 768-dim, fast)
  #   ollama pull mxbai-embed-large    (670MB, 1024-dim, higher quality)
  embed_model: "nomic-embed-text"

# ── Memory settings ───────────────────────────────────────────────
memory:
  enabled: true
  search_k: 5         # memories injected per agent task
  threshold: 0.35     # cosine similarity floor (0.0-1.0)

# ── Document ingest chunking ─────────────────────────────────────
# When files are ingested (PDF/DOCX), they are chunked and embedded
# into memory for semantic search. Requires the docling extra:
#   pip install 'engineering-hub[docling]'
# Falls back to pypdf/python-docx when docling is not installed.
chunking:
  enabled: true
  max_tokens: 512     # per chunk, aligned with nomic-embed-text context

# ── Journaler daemon (always-on ambient listener) ────────────────
# The Journaler runs a local ~32B model, continuously monitors your
# org-roam workspace, delivers morning briefings, and responds to
# ad-hoc questions via HTTP chat.  Requires: pip install 'engineering-hub[mlx]'
#
# journaler:
#   enabled: true
#
#   # HuggingFace model ID for the local MLX model.
#   # Optional: if omitted, Journaler falls back to mlx.model_path then to a built-in default.
#   # Pre-download before first use: engineering-hub journaler download
#   #
#   # Recommended options (Apple Silicon):
#   #
#   #   mlx-community/gemma-4-31b-it-8bit  ← default
#   #     Gemma 4 31B instruction-tuned, 8-bit quantized (~34GB on disk, ~34GB RAM).
#   #     VLM architecture — uses mlx-vlm automatically. 128K context window.
#   #     Best overall quality for briefings, chat, and agentic delegation.
#   #     Requires 64GB+ unified RAM for comfortable operation.
#   #
#   #   mlx-community/gemma-4-31b-it-4bit
#   #     Same model at 4-bit (~17GB). Fits in 32GB with reduced fidelity.
#   #
#   #   mlx-community/Qwen3-30B-A3B-Instruct-2507-4bit
#   #     MoE (~3B active params), fastest, lowest RAM (~32GB). Text-only (mlx-lm).
#   #
#   model_path: "mlx-community/gemma-4-31b-it-8bit"
#
#   # The model's actual context window in tokens.
#   # Used by the context pressure manager to calculate utilization.
#   # Gemma 4 31B: 131072  |  Qwen3-30B-A3B: 32768  |  Qwen2.5-32B: 32768
#   model_context_window: 131072
#
#   # Scan interval for org-roam directory (minutes)
#   scan_interval_min: 10
#
#   # Morning briefing schedule
#   briefing_enabled: true
#   briefing_time: "07:00"       # local time (HH:MM)
#
#   # HTTP chat endpoint
#   chat_enabled: true
#   chat_host: "127.0.0.1"
#   chat_port: 18790
#
#   # Slack webhook (outbound only — post briefings and alerts)
#   slack_enabled: false
#   slack_webhook_url: ""        # or set JOURNALER_SLACK_WEBHOOK env var
#
#   # Conversation settings
#   max_conversation_history: 20 # turns kept in memory
#   max_tokens: 4000
#
#   # Sampling parameters (defaults shown)
#   temp: 0.7
#   top_p: 0.9
#   min_p: 0.05
#   repetition_penalty: 1.1
#
#   # ── Context management ─────────────────────────────────────────
#   # Controls how the daemon manages its finite context window over
#   # a full workday of conversation.  All values below are defaults.
#   context_management:
#     # Fraction of context window used before compression triggers (0.0–1.0)
#     compress_at: 0.70
#     # Fraction at which emergency trim fires if compression isn't enough
#     emergency_trim_at: 0.90
#     # Automatically archive old topic context when conversation topic shifts
#     auto_clear_on_topic_shift: true
#     # Prepend a bracketed note when the engine takes an automatic action
#     notify_user_on_action: true
#     # Time (HH:MM local) to run the end-of-day conversation clear
#     end_of_day_time: "00:00"
#     # Auto-clear conversation after N minutes of inactivity
#     inactivity_clear_minutes: 120
#     # Write daily conversation summaries to memory.db (requires memory.enabled)
#     capture_daily_to_memory: false
#     # Tokens reserved for model output (held back from utilization calc)
#     reserved_for_generation: 2000
#     # Override model_context_window here if different from the top-level setting
#     # model_context_window: 32768
#     # Rolling window limits (also controlled by max_conversation_history above)
#     # max_history_turns: 20
#     # max_history_tokens: 10000
#
#   # ── Agent delegation ──────────────────────────────────────────
#   # The Journaler can delegate tasks inline to named agent personalities
#   # (research, technical-writer, standards-checker, technical-reviewer)
#   # using the /agent slash command in chat.
#
#   # Backend used when the Journaler delegates to an agent personality.
#   #   "auto"   — Claude API if anthropic.api_key is present, else local MLX (default)
#   #   "claude" — always use Claude API (requires anthropic.api_key to be set)
#   #   "mlx"    — always use local model (reuses Journaler's loaded model, no extra RAM)
#   # Can be overridden per-command with --backend mlx|claude in the /agent command.
#   agent_backend: "auto"
#
#   # Path to skills YAML directory. Each .yaml file defines one agent delegation skill.
#   # Drop a new .yaml here to add a delegation capability without code changes.
#   # Default: skills/ directory at the repo root (alongside prompts/).
#   # skills_dir: "~/org-roam/engineering-hub/skills"
#
#   # Anthropic API key for Claude-backed delegation.
#   # If omitted, delegation always uses the local MLX model.
#   # Falls back to ENGINEERING_HUB_ANTHROPIC_API_KEY environment variable if set.
#   # anthropic_api_key: ""

# Agent configurations (optional - defaults are provided)
# agents:
#   research:
#     enabled: true
#     max_tokens: 4000
#   technical-writer:
#     enabled: true
#     max_tokens: 4000
#   standards-checker:
#     enabled: true
#     max_tokens: 4000
