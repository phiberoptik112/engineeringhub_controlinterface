# Engineering Hub Configuration
# Copy this file to your workspace as config.yaml and fill in values

django:
  # Django consultingmanager API URL
  api_url: "http://localhost:8000/api"

  # API authentication token
  # Get this from Django: python manage.py drf_create_token <username>
  # Or set environment variable: ENGINEERING_HUB_DJANGO_API_TOKEN
  api_token: ""

  # Cache TTL for API responses (seconds)
  cache_ttl: 300

anthropic:
  # Anthropic API key for Claude
  # Get this from: https://console.anthropic.com/
  # Or set environment variable: ENGINEERING_HUB_ANTHROPIC_API_KEY
  api_key: ""

  # Claude model to use
  model: "claude-sonnet-4-5-20250929"

  # Maximum tokens for responses
  max_tokens: 4000

workspace:
  # Base workspace directory
  # Default: ~/org-roam/engineering-hub
  dir: "~/org-roam/engineering-hub"

# Journal mode: daily journal with category-based task delegation
journal:
  # Use journal.md (true) or legacy shared-notes.md (false)
  use_journal_mode: true

  # Category header -> agent mapping (items under these become tasks)
  categories:
    "Project Work to-do": "research"
    "Technical Writing Work": "technical-writer"
    "Technical Review Work": "technical-reviewer"
    "Thoughts to Expand or Clarify": "research"
  # "Incoming Comms" has no mapping - notes only

# Staging directory for ingested files (PDF/DOCX -> markdown)
staging:
  manifest_name: "manifest.json"

# ── Local embeddings ──────────────────────────────────────────────
ollama:
  host: "http://localhost:11434"
  # Pull the model once before first use:
  #   ollama pull nomic-embed-text     (274MB, 768-dim, fast)
  #   ollama pull mxbai-embed-large    (670MB, 1024-dim, higher quality)
  embed_model: "nomic-embed-text"

# ── Memory settings ───────────────────────────────────────────────
memory:
  enabled: true
  search_k: 5         # memories injected per agent task
  threshold: 0.35     # cosine similarity floor (0.0-1.0)

