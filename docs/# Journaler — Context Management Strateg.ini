## Strategy 5: Hard Clear (Manual Nuclear Reset)

Sometimes you just want a blank slate. Maybe the model got confused,
maybe you're switching to a completely unrelated topic, maybe you
just want to test something fresh.

**Trigger:** User command via chat or CLI.

```
> /clear
Conversation cleared. Context snapshot retained. Ready for fresh questions.

> /clear --full
Full reset. Conversation, context cache, and scan state cleared.
Next scan will rebuild context from scratch.

> /clear --keep-summary
Compressing current conversation... done (freed 4,200 tokens).
Starting fresh with summary of previous discussion.
```

**Implementation:**

```python
class ClearStrategy(Enum):
    SOFT = "soft"           # clear conversation, keep context snapshot
    HARD = "hard"           # clear conversation + context cache + scan state
    SUMMARIZE = "summarize" # compress then clear (same as strategy 2, but forced)


def execute_clear(
    strategy: ClearStrategy,
    engine: ConversationEngine,
    context: JournalContext,
    compressor: ContextCompressor,
) -> str:
    """Execute a clear command. Returns a status message."""

    if strategy == ClearStrategy.SUMMARIZE:
        result = compressor.compress(engine.history)
        if result.compressed:
            return (
                f"Compressed {result.turns_compressed} turns → "
                f"{result.tokens_after} tokens. "
                f"Freed {result.tokens_freed} tokens."
            )
        return "Nothing to compress."

    elif strategy == ClearStrategy.SOFT:
        turn_count = len(engine.history.turns)
        engine.history.turns.clear()
        return (
            f"Cleared {turn_count} conversation turns. "
            f"Context snapshot retained (last scan: {context.last_scan_time})."
        )

    elif strategy == ClearStrategy.HARD:
        turn_count = len(engine.history.turns)
        engine.history.turns.clear()
        context.reset_state()  # wipes state.json + context_cache.json
        return (
            f"Full reset: {turn_count} turns cleared, "
            f"scan state wiped. Next scan will rebuild from scratch."
        )
```

