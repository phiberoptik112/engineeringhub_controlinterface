## State Files

```
~/org-roam/engineering-hub/.journaler/
├── state.json              # scan state (mtimes, file hashes)
├── context_cache.json      # current compressed context snapshot
├── conversation.jsonl      # full conversation log (all turns, including archived)
├── daily_summaries/
│   ├── 2026-04-01.md       # end-of-day conversation summary
│   ├── 2026-04-02.md
│   └── ...
└── briefings/
    ├── 2026-04-01.md       # morning briefings
    └── ...
```

`conversation.jsonl` is append-only and serves as the permanent record.
The in-memory `ConversationHistory` is the working set; the JSONL file
is the audit trail. You can always reconstruct what was discussed on any
day by reading the JSONL, even after context has been cleared.

