## Strategy 3: Topic-Aware Clear

When you switch from "Project 42 HVAC noise" to "help me draft an email
to a client," the old conversation context is irrelevant. Topic-aware
clear detects the shift and archives the old topic cleanly.

**How it works:**
1. Each message gets a lightweight topic tag (inferred by the model or
   by keyword heuristics)
2. When the topic changes, the engine has three options:
   - **Auto-archive:** Silently compress and archive the old topic
   - **Prompt:** Ask "We were discussing [old topic]. Should I keep that
     context or start fresh?"
   - **Ignore:** Just let the rolling window handle it naturally

**Topic detection — two approaches:**

**Approach A: Keyword heuristic (cheap, no model call)**

```python
PROJECT_PATTERNS = {
    r"project\s+(\d+)": lambda m: f"project_{m.group(1)}",
    r"(?:ASTM|ISO|IBC|ASHRAE)\s+\w+": lambda m: f"standards_{m.group(0)}",
    r"(?:proposal|SOW|scope|fee)": lambda _: "business_writing",
    r"(?:email|slack|message|draft)": lambda _: "communications",
    r"(?:briefing|summary|status|update)": lambda _: "status_review",
}

def detect_topic_heuristic(message: str) -> str | None:
    """Fast keyword-based topic detection. Returns None if ambiguous."""
    for pattern, labeler in PROJECT_PATTERNS.items():
        match = re.search(pattern, message, re.IGNORECASE)
        if match:
            return labeler(match)
    return None
```

**Approach B: Model-inferred topic (accurate, costs a call)**

Ask the model to classify the topic as part of its response. Add to the
system prompt:

```
At the end of each response, on a new line, output:
TOPIC: <2-4 word topic label>

Examples:
TOPIC: project 42 hvac
TOPIC: email drafting
TOPIC: astm standards review
```

Parse the tag from the response, strip it before displaying to the user.
This is free if the model is generating a response anyway — just adds
~10 tokens to the output.

**Recommendation:** Start with heuristic, fall back to model-inferred
for ambiguous cases. Don't spend a model call just for topic detection.

```python
class TopicTracker:
    """
    Tracks conversation topics and detects shifts.
    """

    def __init__(self, shift_threshold: int = 3):
        self.current_topic: str | None = None
        self.topic_history: list[tuple[str, str]] = []  # (timestamp, topic)
        self.shift_threshold = shift_threshold
        self._consecutive_new: int = 0

    def observe(self, message: str, response: str) -> TopicShift | None:
        """
        Observe a new exchange. Returns a TopicShift if the topic
        has changed meaningfully (not just a one-off tangent).
        """
        detected = detect_topic_heuristic(message)
        if detected is None:
            detected = parse_model_topic_tag(response)
        if detected is None:
            return None

        if self.current_topic is None:
            self.current_topic = detected
            return None

        if detected != self.current_topic:
            self._consecutive_new += 1
            if self._consecutive_new >= self.shift_threshold:
                old = self.current_topic
                self.current_topic = detected
                self._consecutive_new = 0
                return TopicShift(old_topic=old, new_topic=detected)
        else:
            self._consecutive_new = 0

        return None


@dataclass
class TopicShift:
    old_topic: str
    new_topic: str
```

The `shift_threshold` (default 3) prevents a single off-topic message from
triggering a clear. You have to stay on a new topic for 3 consecutive
exchanges before the engine considers it a real shift.

