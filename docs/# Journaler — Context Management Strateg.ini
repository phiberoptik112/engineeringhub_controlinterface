## Updated ConversationEngine

The original plan's `ConversationEngine` gains a `pressure_manager` and
integrates the clear/compress hooks:

```python
class ConversationEngine:

    def __init__(
        self,
        model: str,
        host: str,
        backend: str,
        system_prompt_template: str,
        context_config: PressureConfig,
        max_history_turns: int = 20,
        max_history_tokens: int = 10000,
        model_context_window: int = 32768,
    ) -> None:
        self.model = model
        self.host = host
        self.backend = backend
        self.system_prompt_template = system_prompt_template
        self._context_block: str = ""

        # Context management components
        self.history = ConversationHistory(
            max_turns=max_history_turns,
            max_tokens=max_history_tokens,
        )
        self.budget = TokenBudget(
            window_size=model_context_window,
            system_prompt_tokens=estimate_tokens(system_prompt_template),
            context_snapshot_tokens=0,
            history_tokens=0,
            reserved_for_generation=2000,
        )
        self.compressor = ContextCompressor(
            engine_call=self._raw_complete,
            pressure_threshold=context_config.compress_at,
        )
        self.topic_tracker = TopicTracker()
        self.pressure_manager = ContextPressureManager(
            budget=self.budget,
            history=self.history,
            compressor=self.compressor,
            topic_tracker=self.topic_tracker,
            config=context_config,
        )

    def update_context(self, context_block: str) -> None:
        """Called every scan cycle. Updates the rolling context snapshot."""
        self._context_block = context_block
        self.budget.context_snapshot_tokens = estimate_tokens(context_block)

    def chat(self, message: str) -> str:
        """
        Full chat cycle with automatic context management.
        """
        # Pre-call: check pressure, compress if needed
        pre_actions = self.pressure_manager.pre_call_check()

        # Build messages array
        system_prompt = self.system_prompt_template.format(
            context_snapshot=self._context_block,
        )
        messages = [
            {"role": "system", "content": system_prompt},
            *self.history.as_messages(),
            {"role": "user", "content": message},
        ]

        # Call model
        response = self._raw_complete_chat(messages)

        # Add to history
        self.history.add("user", message)
        self.history.add("assistant", response)

        # Post-call: check for topic shifts
        post_actions = self.pressure_manager.post_call_check(message, response)

        # Prepend action notifications if any
        all_actions = pre_actions + post_actions
        if all_actions and self.pressure_manager.config.notify_user_on_action:
            action_text = "\n".join(all_actions)
            response = f"{action_text}\n\n{response}"

        # Flush archived turns to log
        archived = self.history.flush_archive()
        if archived:
            self._log_archived_turns(archived)

        return response

    def clear(self, strategy: ClearStrategy) -> str:
        """Manual clear command."""
        return execute_clear(strategy, self, ...)

    def get_status(self) -> dict:
        """Return current context management state for /status endpoint."""
        return {
            "model": self.model,
            "context_window": self.budget.window_size,
            "utilization": f"{self.budget.utilization:.0%}",
            "pressure": self.budget.pressure,
            "history_turns": len(self.history.turns),
            "history_tokens": self.history.total_tokens,
            "context_snapshot_tokens": self.budget.context_snapshot_tokens,
            "compressions_today": self.compressor.compression_count,
            "current_topic": self.topic_tracker.current_topic,
        }

    def _raw_complete(self, prompt: str, max_tokens: int = 500) -> str:
        """Low-level model call. Used by compressor and briefing generator."""
        ...

    def _raw_complete_chat(self, messages: list[dict]) -> str:
        """Low-level chat completion call."""
        ...

    def _log_archived_turns(self, turns: list[ConversationTurn]) -> None:
        """Append archived turns to conversation.jsonl."""
        ...
```

