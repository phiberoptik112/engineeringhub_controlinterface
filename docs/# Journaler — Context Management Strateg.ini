    model_context_window: 32768    # match your model's actual window
    max_history_turns: 20          # rolling window limit
    max_history_tokens: 10000      # token budget for history
    compress_at: 0.70              # utilization % to trigger compression
    emergency_trim_at: 0.90        # utilization % to force-trim
    auto_clear_on_topic_shift: true
    notify_user_on_action: true
    end_of_day_time: "00:00"
    inactivity_clear_minutes: 120  # auto-clear after 2h silence
    capture_daily_to_memory: false # write daily summary to memory.db
    reserved_for_generation: 2000  # tokens held back for model output
