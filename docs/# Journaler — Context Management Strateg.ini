## Implementation Order (Addendum to Main Plan)

These phases slot in after Phase 3 (ConversationEngine) in the main plan:

| Phase | What | Effort |
|-------|------|--------|
| **3a** | `TokenBudget` + `estimate_tokens` + `ConversationHistory` | ~1h |
| **3b** | `ContextCompressor` — summarize-and-replace logic | ~1.5h |
| **3c** | `TopicTracker` — heuristic detection + model tag parsing | ~1h |
| **3d** | `ContextPressureManager` — orchestration layer | ~1h |
| **3e** | Integrate into `ConversationEngine.chat()` | ~1h |
| **3f** | End-of-day clear + daily summary archival | ~45min |
| **3g** | `/clear`, `/status`, `/budget` chat commands | ~45min |
| **3h** | Smoke test: sustained 50-turn conversation, verify compression fires | ~30min |

**Additional effort: ~7.5 hours on top of the main plan's ~14 hours.**

This brings the total Journaler implementation to ~21.5 hours. The context
management is worth the investment — without it, the daemon degrades after
a few hours of active use and requires manual restarts to recover coherence.