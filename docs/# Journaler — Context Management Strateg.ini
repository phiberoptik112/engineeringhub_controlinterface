## Strategy 6: Pressure-Triggered Auto-Management

This is the orchestration layer that ties the other strategies together.
It runs before every model call and decides what (if anything) needs to
happen.

```python
class ContextPressureManager:
    """
    Monitors token budget and triggers appropriate context management
    strategies based on configurable thresholds.

    Runs automatically before each model call. All actions are logged.
    The user is notified when compression or clearing occurs (a short
    system note prepended to the response).
    """

    def __init__(
        self,
        budget: TokenBudget,
        history: ConversationHistory,
        compressor: ContextCompressor,
        topic_tracker: TopicTracker,
        config: PressureConfig,
    ):
        self.budget = budget
        self.history = history
        self.compressor = compressor
        self.topic_tracker = topic_tracker
        self.config = config

    def pre_call_check(self) -> list[str]:
        """
        Run before every model call. Returns a list of action
        descriptions (empty if nothing happened).
        """
        actions = []

        # Recompute budget
        self.budget.history_tokens = self.history.total_tokens

        pressure = self.budget.pressure

        # Level 1: Moderate pressure — just log it
        if pressure == "moderate":
            logger.debug(
                f"Context pressure: moderate ({self.budget.utilization:.0%})"
            )

        # Level 2: High pressure — compress
        elif pressure == "high":
            if self.compressor.should_compress(self.budget):
                result = self.compressor.compress(self.history)
                if result.compressed:
                    actions.append(
                        f"[Context compressed: freed {result.tokens_freed} tokens]"
                    )

        # Level 3: Critical pressure — aggressive clear
        elif pressure == "critical":
            # First try compression
            result = self.compressor.compress(self.history)
            if result.compressed:
                actions.append(
                    f"[Emergency compression: freed {result.tokens_freed} tokens]"
                )

            # If still critical after compression, drop to last 3 turns
            self.budget.history_tokens = self.history.total_tokens
            if self.budget.pressure == "critical":
                dropped = self._emergency_trim(keep=3)
                actions.append(
                    f"[Emergency trim: dropped {dropped} old turns]"
                )

        return actions

    def post_call_check(
        self,
        user_message: str,
        response: str,
    ) -> list[str]:
        """
        Run after each model call. Handles topic tracking.
        Returns action descriptions.
        """
        actions = []

        shift = self.topic_tracker.observe(user_message, response)
        if shift and self.config.auto_clear_on_topic_shift:
            result = self.compressor.compress(self.history)
            if result.compressed:
                actions.append(
                    f"[Topic shifted: {shift.old_topic} → {shift.new_topic}, "
                    f"compressed {result.turns_compressed} turns]"
                )

        return actions

    def _emergency_trim(self, keep: int) -> int:
        """Force-drop all but the last `keep` turns."""
        if len(self.history.turns) <= keep:
            return 0
        dropped = len(self.history.turns) - keep
        kept = list(self.history.turns)[-keep:]
        self.history._archive.extend(
            list(self.history.turns)[:-keep]
        )
        self.history.turns.clear()
        self.history.turns.extend(kept)
        return dropped


@dataclass
class PressureConfig:
    """Thresholds for automatic context management."""
    compress_at: float = 0.70            # utilization threshold for compression
    emergency_trim_at: float = 0.90      # utilization threshold for aggressive trim
    auto_clear_on_topic_shift: bool = True
    notify_user_on_action: bool = True   # prepend [Context compressed] notes
    end_of_day_time: str = "00:00"       # when to run daily clear
    inactivity_clear_minutes: int = 120  # clear after N minutes of silence
```

---

## How They Compose

These strategies aren't mutually exclusive — they form a layered system
where gentler strategies handle common cases and more aggressive ones
kick in when pressure escalates.

```
Normal operation
    │
    ▼
Rolling Window (always active)
    │  Keeps last N turns, drops oldest
    │  Handles: normal daily usage, short exchanges
    │
    ├── Pressure < 50% → do nothing, keep chatting
    │
    ├── Pressure 50–70% → log a debug note
    │
    ▼
Compression trigger (70% pressure)
    │  Summarize old turns, keep last 3
    │  Handles: long focused conversations, deep dives
    │
    ├── Pressure drops below 50% → back to normal
    │
    ▼
Emergency trim (90% pressure, compression wasn't enough)
    │  Force-drop to last 3 turns
    │  Handles: enormous context snapshots, very long sessions
    │
    ▼
Topic shift (detected independently)
    │  Compress + archive old topic
    │  Handles: switching between projects or task types
    │
    ▼
End-of-day clear (scheduled)
    │  Full archive + summary + reset
    │  Handles: daily lifecycle boundary
    │
    ▼
Manual /clear (user command)
    │  Soft, hard, or summarize — user's choice
    │  Handles: model confusion, fresh-start need, testing
```

---

## User-Facing Notifications

When the system takes an automatic action, the user should know — but it
shouldn't be intrusive. The pattern is a short bracketed note prepended
to the model's response:

```
You: What's the status on project 42?

[Context compressed: freed 3,200 tokens from 12 earlier exchanges]

Journaler: Project 42 is active. You have two pending tasks...
```

For topic shifts:

```
You: Actually, help me draft an email to the contractor.

[Topic shifted: project_42_hvac → email_drafting, archived previous discussion]

Journaler: Sure. What's the main point you need to get across?
```

These notes are only shown when `notify_user_on_action` is True (default).
In Slack messages, they're omitted — Slack recipients don't need to see
internal context management.

