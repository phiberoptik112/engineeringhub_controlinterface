## Strategy 1: Rolling Window (Default, Always Active)

The simplest strategy and the one that should always be running as a
baseline. Conversation history is a deque with a maximum length.

**How it works:**
- Keep the last N turns (configurable, default 20)
- When a new exchange is added and length exceeds N, drop the oldest
- Dropped turns are logged to `conversation.jsonl` (never truly lost)

**When it's sufficient:**
- Normal workday usage: a few questions here and there
- Context snapshot is doing most of the work
- Conversations are short and topically independent

**When it's not enough:**
- Long deep-dive conversations (you're working through a problem)
- Conversations that build on earlier context ("remember what we discussed
  about the HVAC issue earlier?")
- The context snapshot itself is large (busy workspace day)

```python
from collections import deque


@dataclass
class ConversationTurn:
    role: str              # "user" | "assistant"
    content: str
    timestamp: str         # ISO 8601
    tokens: int            # estimated
    topic: str | None      # inferred topic tag (for topic-aware clear)
    preserved: bool        # if True, survives compression/clearing


class ConversationHistory:
    """
    Manages conversation turns with token-aware eviction.
    """

    def __init__(self, max_turns: int = 20, max_tokens: int = 10000):
        self.max_turns = max_turns
        self.max_tokens = max_tokens
        self.turns: deque[ConversationTurn] = deque()
        self._archive: list[ConversationTurn] = []  # dropped turns, for logging

    def add(self, role: str, content: str, topic: str | None = None) -> None:
        turn = ConversationTurn(
            role=role,
            content=content,
            timestamp=datetime.now(timezone.utc).isoformat(),
            tokens=estimate_tokens(content),
            topic=topic,
            preserved=False,
        )
        self.turns.append(turn)
        self._enforce_limits()

    def _enforce_limits(self) -> None:
        """Drop oldest non-preserved turns until within both limits."""
        # Turn count limit
        while len(self.turns) > self.max_turns:
            self._evict_oldest()

        # Token budget limit
        while self.total_tokens > self.max_tokens:
            self._evict_oldest()

    def _evict_oldest(self) -> None:
        """Remove oldest non-preserved turn. Archive it."""
        for i, turn in enumerate(self.turns):
            if not turn.preserved:
                evicted = self.turns[i]
                del self.turns[i]
                self._archive.append(evicted)
                return
        # All preserved — force-evict the oldest anyway
        if self.turns:
            self._archive.append(self.turns.popleft())

    @property
    def total_tokens(self) -> int:
        return sum(t.tokens for t in self.turns)

    def as_messages(self) -> list[dict]:
        """Format for Ollama/MLX API call."""
        return [{"role": t.role, "content": t.content} for t in self.turns]

    def flush_archive(self) -> list[ConversationTurn]:
        """Return and clear archived turns (for logging to JSONL)."""
        archived = self._archive.copy()
        self._archive.clear()
        return archived
```

