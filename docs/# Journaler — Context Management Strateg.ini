## CLI Additions

```bash
# Clear conversation (soft — keeps context snapshot)
engineering-hub journaler clear

# Clear with summary preservation
engineering-hub journaler clear --summarize

# Full reset (wipe everything, rebuild on next scan)
engineering-hub journaler clear --hard

# Check current context pressure
engineering-hub journaler status
# → Model: qwen3.5:32b-q6_K
#   Context window: 32,768 tokens
#   Utilization: 43% (low)
#   History: 8 turns, 2,400 tokens
#   Snapshot: 2,800 tokens
#   Compressions today: 0
#   Topic: project_42_hvac
```

Chat window commands (sent as messages):

```
/clear              → soft clear
/clear --hard       → full reset
/clear --summarize  → compress then clear
/status             → show context management state
/budget             → show token budget breakdown
/topic              → show current detected topic
```

