# Journaler — Context Management Strategies

> **Addendum to the Journaler plan.** This section covers how the Journaler
> manages its finite context window across an always-on daemon lifecycle —
> what fills the window, when to clear it, and the strategies for doing so
> without losing useful conversational state.

---

## The Problem

A 32B model's context window is typically 8K–32K tokens depending on the
model (Qwen 3.5 32B supports 32K; llama3 supports 8K by default, 128K with
RoPE scaling but quality degrades). The Journaler's context is assembled from
four sources that all compete for space:

```
┌───────────────────────────────────────────────────────────────┐
│                    Model Context Window                        │
│                  (e.g. 32,768 tokens)                         │
│                                                               │
│  ┌─────────────────────────────────────┐  ~800 tokens         │
│  │  System Prompt (static)             │  Fixed cost.          │
│  │  Role, personality, instructions    │  Never changes.       │
│  └─────────────────────────────────────┘                      │
│                                                               │
│  ┌─────────────────────────────────────┐  ~2,000–6,000 tokens │
│  │  Context Snapshot (rolling)         │  Refreshed every      │
│  │  org-roam state, tasks, projects,   │  10 min. Size varies  │
│  │  recent memory entries              │  by workspace activity.│
│  └─────────────────────────────────────┘                      │
│                                                               │
│  ┌─────────────────────────────────────┐  ~0–8,000 tokens     │
│  │  Conversation History               │  Grows per exchange.  │
│  │  Your messages + Journaler replies  │  This is what fills   │
│  │                                     │  the window over time.│
│  └─────────────────────────────────────┘                      │
│                                                               │
│  ┌─────────────────────────────────────┐  ~500–2,000 tokens   │
│  │  Current Turn                       │  Your latest message  │
│  │  (user message + model generation)  │  + the response being │
│  │                                     │  generated right now. │
│  └─────────────────────────────────────┘                      │
└───────────────────────────────────────────────────────────────┘
```

**The math for a typical 32K window:**

| Component | Tokens | Fixed/Growing |
|-----------|--------|--------------|
| System prompt | ~800 | Fixed |
| Context snapshot | ~3,000 | Semi-fixed (refreshed, but bounded) |
| Conversation history (20 turns) | ~6,000–10,000 | **Growing** |
| Current turn headroom | ~2,000 | Fixed |
| **Available for generation** | **~16,000–20,000** | — |

At 20 turns of conversation, you're using maybe 30% of the window on
history. That's fine. But the daemon runs all day. If you have 60 exchanges
by afternoon, you're at ~25,000 tokens of history alone — the window is
full, the model starts losing coherence as early context falls outside
its effective attention span, and generation quality drops.

The fix is not just "drop old messages" — it's having deliberate strategies
for what to keep, what to compress, and what to discard based on the
situation.

---

## Token Accounting

Before any strategy can work, the engine needs to know how full the window is.
This is the foundation everything else builds on.

```python
from dataclasses import dataclass, field


@dataclass
class TokenBudget:
    """
    Tracks token allocation across context components.
    Updated before every model call.
    """
    window_size: int              # model's max context (e.g. 32768)
    system_prompt_tokens: int     # measured once at init
    context_snapshot_tokens: int  # re-measured each scan cycle
    history_tokens: int           # sum of all conversation turns
    reserved_for_generation: int  # headroom for model output (~2000)

    @property
    def used(self) -> int:
        return (
            self.system_prompt_tokens
            + self.context_snapshot_tokens
            + self.history_tokens
        )

    @property
    def available(self) -> int:
        return self.window_size - self.used - self.reserved_for_generation

    @property
    def utilization(self) -> float:
        """0.0 to 1.0 — how full the window is."""
        return self.used / self.window_size

    @property
    def pressure(self) -> str:
        """Human-readable pressure level."""
        u = self.utilization
        if u < 0.50:
            return "low"
        elif u < 0.70:
            return "moderate"
        elif u < 0.85:
            return "high"
        else:
            return "critical"


def estimate_tokens(text: str) -> int:
    """
    Fast token estimate without loading a tokenizer.
    Rule of thumb: 1 token ≈ 4 characters for English text.
    Conservative (overestimates slightly) — better to compress
    too early than to overflow.
    """
    return len(text) // 3  # slightly aggressive to leave margin
```

**Why not use a real tokenizer?** Loading `tiktoken` or a model-specific
tokenizer adds a dependency and ~200ms per call. The 1:3 char-to-token
ratio is within 15% accuracy for English prose, which is good enough for
budget management. The strategies trigger on thresholds (70%, 85%), not
exact counts — a 15% estimation error doesn't change the decision.

