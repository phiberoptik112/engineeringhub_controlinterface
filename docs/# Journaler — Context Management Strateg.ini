## Strategy 2: Compression (Summarize-and-Replace)

When the window gets crowded, compress the conversation history into a
short summary and start fresh with that summary as seed context. This
preserves the gist of what was discussed without carrying the full
token weight.

**How it works:**
1. Detect that token pressure is "high" (>70% utilization)
2. Take all conversation turns except the last 3 (keep recent context warm)
3. Ask the model itself to compress them into a ~500 token summary
4. Replace the old turns with a single "assistant" message containing
   the summary, marked as a compression artifact
5. Continue the conversation with the summary as implicit history

**The compression prompt:**

```python
COMPRESSION_PROMPT = """Summarize the following conversation concisely.
Preserve: key decisions, specific numbers/references mentioned, any
open questions, and the current topic being discussed. Discard:
pleasantries, repeated information, tangential remarks.

Format as a brief paragraph, not bullet points. Stay under 200 words.

Conversation to compress:
{conversation_text}
"""
```

**Implementation:**

```python
class ContextCompressor:
    """
    Compresses conversation history into a summary when token
    pressure exceeds a threshold.
    """

    def __init__(
        self,
        engine_call: callable,    # function to call the model
        pressure_threshold: float = 0.70,
        keep_recent: int = 3,
        target_summary_tokens: int = 500,
    ):
        self.engine_call = engine_call
        self.pressure_threshold = pressure_threshold
        self.keep_recent = keep_recent
        self.target_summary_tokens = target_summary_tokens
        self.compression_count: int = 0

    def should_compress(self, budget: TokenBudget) -> bool:
        return budget.utilization >= self.pressure_threshold

    def compress(self, history: ConversationHistory) -> CompressionResult:
        """
        Compress older turns into a summary. Returns the summary text
        and the number of tokens freed.

        The summary is injected as a system-level context note, not as
        a conversation turn — this prevents the model from "replying to"
        the summary as if it were a message.
        """
        if len(history.turns) <= self.keep_recent:
            return CompressionResult(compressed=False, tokens_freed=0)

        # Split: old turns to compress, recent turns to keep
        all_turns = list(history.turns)
        to_compress = all_turns[:-self.keep_recent]
        to_keep = all_turns[-self.keep_recent:]

        # Build the text to compress
        text = "\n".join(
            f"{t.role.upper()}: {t.content}" for t in to_compress
        )
        tokens_before = sum(t.tokens for t in to_compress)

        # Ask the model to summarize
        summary = self.engine_call(
            COMPRESSION_PROMPT.format(conversation_text=text),
            max_tokens=self.target_summary_tokens,
        )

        # Replace history
        summary_turn = ConversationTurn(
            role="system",
            content=f"[Conversation summary — {len(to_compress)} earlier exchanges]\n{summary}",
            timestamp=datetime.now(timezone.utc).isoformat(),
            tokens=estimate_tokens(summary),
            topic=None,
            preserved=True,  # don't evict the summary
        )

        history.turns.clear()
        history.turns.append(summary_turn)
        history.turns.extend(to_keep)

        # Archive compressed turns
        history._archive.extend(to_compress)

        tokens_after = summary_turn.tokens
        self.compression_count += 1

        return CompressionResult(
            compressed=True,
            turns_compressed=len(to_compress),
            tokens_before=tokens_before,
            tokens_after=tokens_after,
            tokens_freed=tokens_before - tokens_after,
            summary_text=summary,
        )


@dataclass
class CompressionResult:
    compressed: bool
    turns_compressed: int = 0
    tokens_before: int = 0
    tokens_after: int = 0
    tokens_freed: int = 0
    summary_text: str = ""
```

**Cost of compression:** One extra model call (~500 output tokens). On a
local 32B model at ~20 tok/s, that's ~25 seconds. Acceptable if it only
triggers every 30–60 minutes of active conversation. If it triggers more
often, the conversation is dense enough that compression is saving the
session.

