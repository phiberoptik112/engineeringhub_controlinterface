## Strategy 4: Scheduled Clear (End-of-Day Reset)

The Journaler's context should not accumulate across days. Yesterday's
conversation is rarely relevant to today's questions — and the morning
briefing already captures what matters from the previous day's activity.

**How it works:**
- At a configurable time (default: midnight, or 30 min after the last
  user message, whichever is earlier), the daemon:
  1. Compresses the full day's conversation into a summary
  2. Saves the summary to `.journaler/daily_summaries/YYYY-MM-DD.md`
  3. Clears conversation history entirely
  4. Optionally writes the summary to `memory.db` as a
     `source="journaler"` entry (if configured)

This means every morning starts clean. The morning briefing runs against
fresh org-roam scans, not stale conversation state.

```python
def _end_of_day_clear(
    engine: ConversationEngine,
    compressor: ContextCompressor,
    memory_service: MemoryService | None,
    config: JournalerConfig,
) -> None:
    """
    End-of-day housekeeping. Compress, archive, reset.
    Called by the scheduler or by inactivity timeout.
    """
    history = engine.history

    if not history.turns:
        return  # nothing to clear

    # Compress the full day's conversation
    all_text = "\n".join(
        f"{t.role.upper()} ({t.timestamp[:16]}): {t.content}"
        for t in history.turns
        if t.role != "system"
    )

    summary = compressor.engine_call(
        f"Summarize today's conversation for archival. "
        f"Include key decisions, open questions, and action items.\n\n"
        f"{all_text}",
        max_tokens=800,
    )

    # Save to daily summary file
    date_str = datetime.now().strftime("%Y-%m-%d")
    summary_path = config.state_dir / "daily_summaries" / f"{date_str}.md"
    summary_path.parent.mkdir(parents=True, exist_ok=True)
    summary_path.write_text(
        f"# Journaler Daily Summary — {date_str}\n\n"
        f"Exchanges: {len(history.turns)}\n\n"
        f"{summary}\n"
    )

    # Optionally capture to memory
    if config.capture_daily_to_memory and memory_service:
        memory_service.capture(
            content=f"Journaler daily summary ({date_str}):\n{summary}",
            source="journaler",
            tags=["daily_summary", date_str],
        )

    # Flush conversation log
    archive = history.flush_archive()
    _write_archive_to_jsonl(archive + list(history.turns), config.conversation_log)

    # Reset
    history.turns.clear()
    logger.info(f"End-of-day clear: {len(archive)} turns archived, summary saved")
```

